<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — product</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUCKET = "product-images";
    function imageURL(path){ return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}` }
    const data = JSON.parse(localStorage.getItem("view_product")||"null");
    const box = document.getElementById("box");
    if(!data){ box.innerHTML = "<p>Product not found.</p>"; }
    else{
      box.innerHTML = `
        <div class="p-hero"><img src="${imageURL(data.image_path)}" alt="${data.name}" class="p-hero-img"/></div>
        <h2 class="p-title">${data.name}</h2>
        <div class="p-price">$${data.price}</div>
        <div class="p-desc">${data.description||""}</div>
        <div class="p-actions">
          <button id="addCart" class="btn">Add to cart</button>
          <button id="orderBtn" class="btn order">Order now</button>
        </div>
      `;
    }
    document.addEventListener("click", (e)=>{
      if(e.target.id==="addCart"){
        const cart = JSON.parse(localStorage.getItem("growth_cart")||"[]");
        cart.push({name:data.name, price:+data.price, qty:1});
        localStorage.setItem("growth_cart", JSON.stringify(cart));
        e.target.textContent="Added ✓";
      }
      if(e.target.id==="orderBtn"){
        localStorage.setItem("checkout_product", JSON.stringify({name:data.name, price:data.price, image:imageURL(data.image_path)}));
        window.location.href="checkout.html";
      }
    });
  </script>
</head>
<body>
  <main class="product-page centered"><div id="box"></div></main>
</body>
</html>
