<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — product</title>
  <link rel="stylesheet" href="css/style.css"/>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcpeelth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndHprbmVjc3R6bHhjcGVlbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MTQ5NjksImV4cCI6MjA3ODE5MDk2OX0.IXvn2GvftKM96DObzCzA1Nvaye9dHri7t5SZfER0eDg";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUCKET = "product-images";

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

const box = document.getElementById("box");

function imageURL(path){
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

async function loadProduct() {

  if(!productId){
    box.innerHTML = "<p>Product not found.</p>";
    return;
  }

  const { data, error } = await supabase
    .from("products")
    .select("*")
    .eq("id", productId)
    .single();

  if(error || !data){
    box.innerHTML = "<p>Product not found.</p>";
    return;
  }

  box.innerHTML = `
    <div class="p-hero">
      <img src="${imageURL(data.image_path)}" alt="${data.name}" class="p-hero-img"/>
    </div>

    <h2 class="p-title">${data.name}</h2>
    <div class="p-price">$${data.price}</div>
    <div class="p-desc">${data.description || ""}</div>

    <div class="p-actions">
      <button id="addCart" class="btn">Add to cart</button>
      <button id="orderBtn" class="btn order">Order now</button>
    </div>
  `;

  document.getElementById("addCart").onclick = () => {
    const cart = JSON.parse(localStorage.getItem("growth_cart")||"[]");
    cart.push({ id:data.id, name:data.name, price:+data.price, qty:1, image:imageURL(data.image_path) });
    localStorage.setItem("growth_cart", JSON.stringify(cart));
    document.getElementById("addCart").textContent = "Added ✓";
  };

  document.getElementById("orderBtn").onclick = () => {
    localStorage.setItem("checkout_product", JSON.stringify({
      id:data.id, name:data.name, price:data.price, image:imageURL(data.image_path)
    }));
    window.location.href="checkout.html";
  };
}

loadProduct();
</script>

</head>
<body>
  <main class="product-page centered"><div id="box"></div></main>
</body>
</html>
