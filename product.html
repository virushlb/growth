
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Product — growth</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const local = JSON.parse(localStorage.getItem('view_product')||'null');
    const box = document.getElementById('productBox');
    if(local){
      box.innerHTML = `
        <img src="${local.image_url}" alt="${local.name}"/>
        <div class="title">${local.name}</div>
        <div class="price">$${local.price}</div>
        <div class="desc" id="desc">Loading description…</div>
        <div class="product-buttons" style="margin-top:12px;">
          <button class="btn add">Add to Cart</button>
          <button class="btn order">Order</button>
        </div>
      `;
      // try to fetch fresh description by name
      try{
        const { data } = await supabase.from('products').select('description,stock').eq('name', local.name).limit(1).maybeSingle();
        if(data){
          document.getElementById('desc').innerText = data.description || '';
          if(typeof data.stock === 'number'){
            const p = document.createElement('div');
            p.className = 'product-stock';
            p.innerText = data.stock>0 ? `In stock: ${data.stock}` : 'Out of stock';
            box.appendChild(p);
          }
        }else{
          document.getElementById('desc').innerText = '';
        }
      }catch(_){ document.getElementById('desc').innerText=''; }
    }

    document.addEventListener('click', (e)=>{
      if(e.target.classList.contains('order')){
        localStorage.setItem('checkout_product', JSON.stringify({
          name: document.querySelector('.title').innerText,
          price: document.querySelector('.price').innerText.replace('$',''),
          image: document.querySelector('.product-page img').src
        }));
        window.location.href='checkout.html';
      }
    });
  </script>
</head>
<body>
  <main class="product-page">
    <div id="productBox" class="product-page"></div>
  </main>
</body>
</html>
