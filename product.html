<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — product</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
</head>

<body>

<header class="nav">
  <a class="brand" href="index.html">growth</a>
  <nav class="links">
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="index.html#about">About</a>
  </nav>
  <div class="cart">
    <a href="cart.html">
      <img src="assets/basket.png" alt="cart"/>
      <span id="cartCount" class="badge">0</span>
    </a>
  </div>
</header>

<main class="product-page centered">
  <div id="box"></div>
</main>

<footer class="footer">
  <small>© <span id="year"></span> growth.lbb</small>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcpeelth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndHprbmVjc3R6bHhjcGVlbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MTQ5NjksImV4cCI6MjA3ODE5MDk2OX0.IXvn2GvftKM96DObzCzA1Nvaye9dHri7t5SZfER0eDg";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUCKET = "product-images";

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

function imageURL(path){
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

async function loadProduct() {

  const box = document.getElementById("box");

  if(!productId){
    box.innerHTML = "<p>Product not found.</p>";
    return;
  }

  const { data, error } = await supabase
    .from("products")
    .select("*")
    .eq("id", productId)
    .single();

  if(error || !data){
    box.innerHTML = "<p>Product not found.</p>";
    return;
  }

  box.innerHTML = `
    <div class="p-hero">
      <img src="${imageURL(data.image_path)}" alt="${data.name}" class="p-hero-img"/>
    </div>

    <h2 class="p-title">${data.name}</h2>
    <div class="p-price">$${data.price}</div>
    <div class="p-desc">${data.description || ""}</div>

    <div class="p-actions">
      <button id="addCart" class="btn">Add to cart</button>
      <button id="orderBtn" class="btn order">Order now</button>
    </div>
  `;

document.getElementById("addCart").onclick = () => {
  let cart = JSON.parse(localStorage.getItem("growth_cart") || "[]");

  let existing = cart.find(item => item.id === data.id);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({
      id: data.id,
      name: data.name,
      price: Number(data.price),
      qty: 1,
      image: imageURL(data.image_path)
    });
  }

  localStorage.setItem("growth_cart", JSON.stringify(cart));
  updateCartCount();
  document.getElementById("addCart").textContent = "Added ✓";
  window.location.href = "cart.html"; // ✅ Goes to cart after adding
};

function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("growth_cart") || "[]");
  document.getElementById("cartCount").textContent = cart.reduce((t,i)=>t+i.qty,0);
}
updateCartCount();



 document.getElementById("orderBtn").onclick = () => {
  const cart = JSON.parse(localStorage.getItem("growth_cart")||"[]");
  cart.push({ id:data.id, name:data.name, price:+data.price, qty:1, image:imageURL(data.image_path) });
  localStorage.setItem("growth_cart", JSON.stringify(cart));
  updateCartCount(); // ← Updates before redirect
  window.location.href = "cart.html";
};
}

loadProduct();
</script>
<script>
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("growth_cart") || "[]");
  document.getElementById("cartCount").textContent = cart.length;
}
updateCartCount();
</script>

</body>
</html>
