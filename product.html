<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — product</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>

<header class="nav">
  <a class="brand" href="index.html">growth</a>
  <nav class="links">
    <a href="products.html">Products</a>
    <a href="index.html#about">About</a>
  </nav>
  <div class="cart" style="margin-right:12px;">
    <a href="cart.html" title="Cart">
      <img src="assets/basket.png" alt="cart"/>
      <span id="cartCount" class="badge">0</span>
    </a>
  </div>
</header>

<main class="product-page">
  <div id="box"></div>
</main>

<footer class="footer">
  <small>© <span id="year"></span> growth.lbb</small>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcpeelth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndHprbmVjc3R6bHhjcGVlbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MTQ5NjksImV4cCI6MjA3ODE5MDk2OX0.IXvn2GvftKM96DObzCzA1Nvaye9dHri7t5SZfER0eDg";
const BUCKET = "product-images";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

const box = document.getElementById("box");

function imageURL(path){
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

async function loadProduct() {

  const { data, error } = await supabase
    .from("products")
    .select("*")
    .eq("id", productId)
    .single();

  if (error || !data) {
    box.innerHTML = "<p>Product not found.</p>";
    return;
  }

box.innerHTML = `
  <div class="p-wrap">
    <img src="${imageURL(data.image_path)}" class="p-img"/>

    <div class="p-info">
      <h1>${data.name}</h1>
      <h2>$${data.price}</h2>
      <p>${data.description || ""}</p>

      <div class="p-buttons">
        <button id="addCart" class="btn">Add to cart</button>
        <button id="orderBtn" class="btn order">Order now</button>
      </div>
    </div>
  </div>
`;


document.getElementById("addCart").onclick = () => {
  const cart = JSON.parse(localStorage.getItem("growth_cart")||"[]");
  cart.push({ id:data.id, name:data.name, price:+data.price, qty:1, image:imageURL(data.image_path) });
  localStorage.setItem("growth_cart", JSON.stringify(cart));
  document.getElementById("addCart").textContent = "Added ✓";
  updateCartCount(); // <--- THIS FIXES THE NUMBER
};


document.getElementById("orderBtn").onclick = () => {
  const cart = JSON.parse(localStorage.getItem("growth_cart")||"[]");
  cart.push({ id:data.id, name:data.name, price:+data.price, qty:1, image:imageURL(data.image_path) });
  localStorage.setItem("growth_cart", JSON.stringify(cart));
  window.location.href = "cart.html";
};

loadProduct();
  
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("growth_cart") || "[]");
  document.getElementById("cartCount").textContent = cart.length;
}
updateCartCount();

</script>

</body>
</html>
