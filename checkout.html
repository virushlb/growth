
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Checkout — growth</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.addEventListener('DOMContentLoaded', ()=>{
      const prod = JSON.parse(localStorage.getItem('checkout_product')||'null');
      document.getElementById('prod').innerHTML = prod ? `
        <img src="${prod.image}" class="product-img" style="height:140px;">
        <div class="product-name">${prod.name}</div>
        <div class="product-price">$${prod.price}</div>
      ` : 'No product selected';
      document.getElementById('place').onclick = async ()=>{
        const customer_name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const notes = document.getElementById('notes').value.trim();
        if(!customer_name || !phone || !address){ alert('Please fill Name, Phone, Address'); return;}
        const { error } = await supabase.from('growth_orders').insert([{
          product_name: prod.name, product_image: prod.image, product_price: prod.price,
          customer_name, phone, address, notes
        }]);
        if(!error){ alert('Order placed!'); localStorage.removeItem('checkout_product'); window.location.href='products.html';}
        else alert('Error placing order');
      };
    });
  </script>
</head>
<body>
  <main class="checkout-container">
    <h2>Complete Your Order</h2>
    <div id="prod"></div>
    <input id="name" placeholder="Your Full Name"/>
    <input id="phone" placeholder="Phone Number"/>
    <input id="address" placeholder="Full Address"/>
    <textarea id="notes" placeholder="Notes (optional)"></textarea>
    <button id="place" class="btn">Place Order</button>
  </main>
</body>
</html>
