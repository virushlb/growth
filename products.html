<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — products</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
</head>

<body>
<header class="nav">
  <a class="brand" href="index.html">growth</a>
  <nav class="links">
    <a class="active" href="products.html">Products</a>
    <a href="index.html#about">About</a>
  </nav>
  <div class="cart" style="margin-right:12px;">
    <a href="cart.html" title="Cart">
      <img src="assets/basket.png" alt="cart"/>
      <span id="cartCount" class="badge">0</span>
    </a>
  </div>
</header>

<main class="container">
  <h1 class="page-title">Products</h1>
  <div id="productGrid" class="grid"></div>
  <p id="loading">Loading products...</p>
</main>

<footer class="footer">
  <small>© <span id="year"></span> growth.lbb</small>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcppeelth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndHprbmVjc3R6bHhjcGVlbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MTQ5NjksImV4cCI6MjA3ODE5MDk2OX0.IXvn2GvftKM96DObzCzA1Nvaye9dHri7t5SZfER0eDg"; // <-- Replace this
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const grid = document.getElementById("productGrid");
const loadingText = document.getElementById("loading");

// Load products
async function loadProducts(category = null) {
  loadingText.style.display = "block";
  grid.innerHTML = "";

  let query = supabase
    .from("products")
    .select("id, name, price, category, description, stock, image_path");

  if (category && category !== "all") {
    query = query.eq("category", category);
  }

  const { data, error } = await query;
  loadingText.style.display = "none";

  if (error) {
    console.error(error);
    grid.innerHTML = "<p>Failed to load products.</p>";
    return;
  }

  data.forEach(product => {
    const imageUrl = supabase.storage
      .from("product-images")
      .getPublicUrl(product.image_path).data.publicUrl;

    grid.innerHTML += `
      <div class="product-card" onclick="window.location.href='product.html?id=${product.id}'">
        <img src="${imageUrl}" alt="${product.name}">
        <h3>${product.name}</h3>
        <p>${product.price} $</p>
      </div>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
