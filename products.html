<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — products</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
</head>

<body>
<header class="nav">
  <a class="brand" href="index.html">growth</a>
  <nav class="links">
    <a class="active" href="products.html">Products</a>
    <a href="index.html#about">About</a>
  </nav>
  <div class="cart" style="margin-right:12px;">
    <a href="cart.html" title="Cart">
      <img src="assets/basket.png" alt="cart"/>
      <span id="cartCount" class="badge">0</span>
    </a>
  </div>
</header>

<main class="container">
  <h1 class="page-title">Products</h1>
  <div id="productGrid" class="grid"></div>
  <p id="loading">Loading products...</p>
</main>

<footer class="footer">
  <small>© <span id="year"></span> growth.lbb</small>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcpeelth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndHprbmVjc3R6bHhjcGVlbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MTQ5NjksImV4cCI6MjA3ODE5MDk2OX0.IXvn2GvftKM96DObzCzA1Nvaye9dHri7t5SZfER0eDg";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const productGrid = document.getElementById("productGrid");
const loading = document.getElementById("loading");

async function loadProducts() {
  loading.textContent = "Loading products...";

  const { data, error } = await supabase
    .from("products")
    .select("id, name, price, image_path");

  if (error) {
    console.error(error);
    loading.textContent = "Failed to load products.";
    return;
  }

  loading.style.display = "none";

  productGrid.innerHTML = data.map(p => `
    <div class="card" onclick="window.location.href='product.html?id=${p.id}'">
      <img src="${p.image_path}" alt="${p.name}">
      <h4>${p.name}</h4>
      <p class="price">$${p.price}</p>
    </div>
  `).join("");
}

loadProducts();
</script>

</body>
</html>
