<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — products</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
</head>

<body>
<header class="nav">
  <a class="brand" href="index.html">growth</a>
  <nav class="links">
    <a class="active" href="products.html">Products</a>
    <a href="index.html#about">About</a>
  </nav>
  <div class="cart" style="margin-right:12px;">
    <a href="cart.html" title="Cart">
      <img src="assets/basket.png" alt="cart"/>
      <span id="cartCount" class="badge">0</span>
    </a>
  </div>
</header>

<main class="container">
  <h1 class="page-title">Products</h1>
<div class="category-bar">
  <button class="cat-btn" data-filter="all">All</button>
  <button class="cat-btn" data-filter="socks">Socks</button>
  <button class="cat-btn" data-filter="mugs">Mugs</button>
  <button class="cat-btn" data-filter="gifts">Gifts</button>
</div>
  <div id="productGrid" class="grid"></div>
  <p id="loading">Loading products...</p>
</main>

<footer class="footer">
  <small>© <span id="year"></span> growth.lbb</small>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcpeelth.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOi..."; // keep your key

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allProducts = [];

async function loadProducts() {
  const { data } = await supabase
    .from("products")
    .select("id, name, price, category, image_url, stock");

  allProducts = data.map(p => ({ ...p, category: (p.category || "").toLowerCase() }));
  renderProducts(allProducts);
}

function renderProducts(list) {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = list.map(p => `
    <article class="card" data-category="${p.category}">
      <div class="ph" style="background-image:url('${p.image_url}')"></div>
      <h4>${p.name}</h4>
      <p class="price">$${p.price}</p>
      <div class="actions">
        <button class="add" data-name="${p.name}" data-price="${p.price}">
          <img src="assets/add-to-cart.png" alt=""> Add to cart
        </button>
        <button class="view" data-product='${JSON.stringify(p)}'>View</button>
      </div>
    </article>
  `).join("");
  setupAddCart();
  setupViewProduct();
}

document.querySelectorAll(".cat-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const filter = btn.dataset.filter.toLowerCase();
    const filtered = filter === "all" ? allProducts : allProducts.filter(p => p.category === filter);
    renderProducts(filtered);
  });
});

function setupAddCart(){
  document.querySelectorAll(".add").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      let cart = JSON.parse(localStorage.getItem("growth_cart")||"[]");
      cart.push({name:btn.dataset.name,price:+btn.dataset.price,qty:1});
      localStorage.setItem("growth_cart", JSON.stringify(cart));
    });
  });
}

function setupViewProduct(){
  document.querySelectorAll(".view").forEach(btn=>{
    btn.addEventListener("click",()=>{
      localStorage.setItem("view_product", btn.dataset.product);
      window.location.href="product.html";
    });
  });
}

loadProducts();
</script>


<div id="imgModal" class="modal">
 <span class="close">&times;</span>
 <img class="modal-content" id="modalImg">
</div>
</body>

</html>
