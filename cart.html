<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>growth — cart</title>

  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
</head>
<body>

<header class="nav">
  <a class="brand" href="index.html">growth</a>
  <nav class="links">
    <a href="products.html">Products</a>
    <a class="active" href="cart.html">Cart</a>
    <a href="index.html#about">About</a>
  </nav>
  <div class="cart">
    <a href="cart.html">
      <img src="assets/basket.png" alt="cart"/>
      <span id="cartCount" class="badge">0</span>
    </a>
  </div>
</header>

<main class="container">

  <h1 class="page-title">cart</h1>

  <div id="cartList" class="cart-list"></div>

  <div class="cart-total-box">
    <p><strong>Products Total:</strong> <span id="cartTotal">$0</span></p>
    <p><strong>Delivery Fee:</strong> $4</p>
    <h2>Final Total: $<span id="finalTotal">0</span></h2>
  </div>

  <h2 class="checkout-title">Checkout</h2>

<form id="checkoutForm" class="checkout-form">
  <input type="text" id="customerName" placeholder="Full Name" required>
  <input type="text" id="customerPhone" placeholder="Phone Number" required>
  <input type="text" id="customerAddress" placeholder="Full Address" required>
  <button class="cta" type="submit">Place Order</button>
</form>


</main>

<footer class="footer">
  <small>© <span id="year"></span> growth.lbb</small>
</footer>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ngtzknecstzlxcpeelth.supabase.co";
const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndHprbmVjc3R6bHhjcGVlbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MTQ5NjksImV4cCI6MjA3ODE5MDk2OX0.IXvn2GvftKM96DObzCzA1Nvaye9dHri7t5SZfER0eDg";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function load(){ return JSON.parse(localStorage.getItem("growth_cart") || "[]"); }
function save(arr){ localStorage.setItem("growth_cart", JSON.stringify(arr)); }


function updateCartCount(){
  const c = load();
  document.getElementById("cartCount").textContent = c.reduce((t,i)=>t+i.qty,0);
}

function render(){
  const cart = load();
  const list = document.getElementById("cartList");
  let total = 0;

  if(cart.length === 0){
    list.innerHTML = "<p>Your cart is empty.</p>";
  } else {
    list.innerHTML = cart.map((item,i)=>`
      <div class="cart-item">
        <span>${item.name} (x${item.qty})</span>
        <div class="cart-controls">
          <button onclick="changeQty(${i},-1)">-</button>
          <button onclick="changeQty(${i},1)">+</button>
          <button onclick="removeItem(${i})">remove</button>
        </div>
      </div>
    `).join("");

    total = cart.reduce((sum,item)=> sum + item.price*item.qty, 0);
  }

  document.getElementById("cartTotal").textContent = "$"+total;
  document.getElementById("finalTotal").textContent = total + 4;

  updateCartCount();
}

window.changeQty = (i,d) => {
  let c = load();
  c[i].qty = Math.max(1, c[i].qty + d);
  save(c);
  render();
  updateCartCount();
}

window.removeItem = (i) => {
  let c = load();
  c.splice(i,1);
  save(c);
  render();
  updateCartCount();
}

document.getElementById("placeOrder").onclick = async ()=>{
  const cart = load();
  if(!cart.length) return;

  const name = document.getElementById("customerName").value;
  const phone = document.getElementById("customerPhone").value;
  const address = document.getElementById("customerAddress").value;
  const productsTotal = parseFloat(document.getElementById("cartTotal").textContent.replace("$",""));
  const finalTotal = productsTotal + 4;

  await supabase.from("orders").insert({
    name, phone, address,
    items: cart,
    products_total: productsTotal,
    delivery_fee: 4,
    total: finalTotal
  });

  for(const item of cart){
    let { data } = await supabase.from("products").select("stock").eq("name", item.name).single();
    if(data){
      await supabase.from("products").update({
        stock: Math.max(0, data.stock - item.qty)
      }).eq("name", item.name);
    }
  }

  save([]);
  alert("✅ Order placed successfully!");
  window.location.href="products.html";
};

document.getElementById('year').textContent = new Date().getFullYear();
render();
</script>
<script>
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("growth_cart") || "[]");
  document.getElementById("cartCount").textContent = cart.length;
}
updateCartCount();
</script>

</body>
</html>
